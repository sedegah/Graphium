<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphium Dependency Graph</title>
    <script src="{{libCytoscape}}"></script>
    <script src="{{libLayoutBase}}"></script>
    <script src="{{libCoseBase}}"></script>
    <script src="{{libFcose}}"></script>
    <script src="{{libPopper}}"></script>
    <script src="{{libTippy}}"></script>
    <script src="{{libCyPopper}}"></script>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src {{cspSource}} https: data:; script-src 'unsafe-inline' {{cspSource}}; style-src 'unsafe-inline' {{cspSource}};">
    <link rel="stylesheet" href="{{libTippyCss}}" />
    <link href="{{styleUri}}" rel="stylesheet">
</head>

<body>
    <div id="error-display"
        style="display:none; padding: 20px; color: #f85149; background: #111111; border: 1px solid #f85149; position: fixed; top: 0; left: 0; right: 0; z-index: 10000; font-family: monospace; white-space: pre-wrap;">
    </div>
    <script>
        window.vscode = acquireVsCodeApi();
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const err = { message: msg, url: url, line: lineNo, col: columnNo, stack: error ? error.stack : 'no stack' };
            vscode.postMessage({ command: 'error', text: JSON.stringify(err) });
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            display.innerText += 'Error: ' + msg + '\nLine: ' + lineNo + '\n';
            return false;
        };
        console.log = function () {
            vscode.postMessage({ command: 'log', text: Array.from(arguments).join(' ') });
        };
        console.error = function () {
            vscode.postMessage({ command: 'error', text: Array.from(arguments).join(' ') });
        };
    </script>
    <div id="controls">
        <input type="text" id="filter" placeholder="Filter nodes...">
        <button id="reset">Reset View</button>
        <button id="export">Export PNG</button>
    </div>
    <div id="cy">
        <div style="padding: 20px; color: #ffffff;">Initializing Graphium... If this stays blank, check VS Code
            developer console.</div>
    </div>

    <script id="graphium-data" type="application/json">{{graphData}}</script>
    <script id="cycle-data" type="application/json">{{cycleData}}</script>
    <script>
        window.graphData = JSON.parse(document.getElementById('graphium-data').textContent || '{}');
        window.cycleData = JSON.parse(document.getElementById('cycle-data').textContent || '[]');
        window.__graphiumBooted = false;

        // Emergency fallback if external script fails to load/execute in host webview.
        setTimeout(function () {
            if (window.__graphiumBooted) {
                return;
            }

            var container = document.getElementById('cy');
            if (!container) {
                return;
            }

            var graphData = window.graphData || {};
            var nodeIds = Object.keys(graphData);
            if (nodeIds.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #8b949e;">No JS/TS files found to visualize.</div>';
                return;
            }

            var width = Math.max(container.clientWidth || 1000, 900);
            var height = Math.max(container.clientHeight || 700, 600);
            var cx = width / 2;
            var cy = height / 2;
            var radius = Math.max(160, Math.min(width, height) * 0.34);
            var positions = {};

            for (var i = 0; i < nodeIds.length; i++) {
                var id = nodeIds[i];
                var angle = (i / nodeIds.length) * Math.PI * 2;
                positions[id] = {
                    x: cx + radius * Math.cos(angle),
                    y: cy + radius * Math.sin(angle)
                };
            }

            var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="100%" style="background:#111;display:block">';
            svg += '<defs><marker id="g-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/></marker></defs>';

            for (var s = 0; s < nodeIds.length; s++) {
                var source = nodeIds[s];
                var deps = (graphData[source] && graphData[source].dependencies) || [];
                for (var d = 0; d < deps.length; d++) {
                    var dep = deps[d];
                    var target = typeof dep === 'string' ? dep : dep.path;
                    if (!positions[target]) {
                        continue;
                    }
                    var p1 = positions[source];
                    var p2 = positions[target];
                    svg += '<line x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y + '" stroke="#ffffff" stroke-opacity="0.75" stroke-width="1.3" marker-end="url(#g-arrow)" />';
                }
            }

            for (var n = 0; n < nodeIds.length; n++) {
                var nodeId = nodeIds[n];
                var p = positions[nodeId];
                var label = nodeId.split('/').pop() || nodeId;
                var safeNode = nodeId.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                var safeLabel = label.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                svg += '<g data-node="' + safeNode + '" style="cursor:pointer">';
                svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="12" fill="#58a6ff" stroke="#ffffff" stroke-width="1.8" />';
                svg += '<text x="' + p.x + '" y="' + (p.y + 24) + '" fill="#ffffff" font-size="11" text-anchor="middle">' + safeLabel + '</text>';
                svg += '<title>' + safeNode + '</title>';
                svg += '</g>';
            }

            svg += '</svg>';
            container.innerHTML = '<div style="position:absolute;top:56px;left:20px;z-index:11;background:#1f2937;color:#fff;padding:6px 10px;border:1px solid #374151;border-radius:6px;font-size:11px;">Emergency graph mode (script load fallback)</div>' + svg;

            var groups = container.querySelectorAll('g[data-node]');
            for (var g = 0; g < groups.length; g++) {
                groups[g].addEventListener('click', function (ev) {
                    var node = ev.currentTarget.getAttribute('data-node');
                    if (node && window.vscode) {
                        window.vscode.postMessage({ command: 'openFile', text: node });
                    }
                });
            }
        }, 1200);
    </script>
    <script src="{{scriptUri}}"></script>
</body>

</html>
