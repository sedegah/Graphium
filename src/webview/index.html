<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphium Dependency Graph</title>
    <script src="{{libCytoscape}}"></script>
    <script src="{{libLayoutBase}}"></script>
    <script src="{{libCoseBase}}"></script>
    <script src="{{libFcose}}"></script>
    <script src="{{libPopper}}"></script>
    <script src="{{libTippy}}"></script>
    <script src="{{libCyPopper}}"></script>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src {{cspSource}} https: data:; script-src 'unsafe-inline' {{cspSource}}; style-src 'unsafe-inline' {{cspSource}};">
    <link rel="stylesheet" href="{{libTippyCss}}" />
    <link href="{{styleUri}}" rel="stylesheet">
</head>

<body>
    <div id="error-display"
        style="display:none; padding: 20px; color: #f85149; background: #111111; border: 1px solid #f85149; position: fixed; top: 0; left: 0; right: 0; z-index: 10000; font-family: monospace; white-space: pre-wrap;">
    </div>
    <script>
        window.vscode = acquireVsCodeApi();
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const err = { message: msg, url: url, line: lineNo, col: columnNo, stack: error ? error.stack : 'no stack' };
            vscode.postMessage({ command: 'error', text: JSON.stringify(err) });
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            display.innerText += 'Error: ' + msg + '\nLine: ' + lineNo + '\n';
            return false;
        };
        console.log = function () {
            vscode.postMessage({ command: 'log', text: Array.from(arguments).join(' ') });
        };
        console.error = function () {
            vscode.postMessage({ command: 'error', text: Array.from(arguments).join(' ') });
        };
    </script>
    <div id="controls">
        <input type="text" id="filter" placeholder="Filter nodes...">
        <button id="reset">Reset View</button>
        <button id="export">Export PNG</button>
    </div>
    <div id="cy">
        <div style="padding: 20px; color: #ffffff;">Initializing Graphium... If this stays blank, check VS Code
            developer console.</div>
    </div>

    <script id="graphium-data" type="application/json">{{graphData}}</script>
    <script id="cycle-data" type="application/json">{{cycleData}}</script>
    <script>
        window.graphData = JSON.parse(document.getElementById('graphium-data').textContent || '{}');
        window.cycleData = JSON.parse(document.getElementById('cycle-data').textContent || '[]');
        window.__graphiumBooted = false;

        // Fallback renderer for hosts where external script loading is unreliable.
        setTimeout(function () {
            if (window.__graphiumBooted) {
                return;
            }

            window.__graphiumBooted = true;

            var container = document.getElementById('cy');
            if (!container) {
                return;
            }

            var graphData = window.graphData || {};
            var nodeIds = Object.keys(graphData);
            if (nodeIds.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #8b949e;">No JS/TS files found to visualize.</div>';
                return;
            }

            var width = Math.max(container.clientWidth || 1000, 900);
            var height = Math.max(container.clientHeight || 700, 620);
            var nodeMap = {};
            var nodes = [];
            var links = [];

            for (var ni = 0; ni < nodeIds.length; ni++) {
                var nid = nodeIds[ni];
                var node = {
                    id: nid,
                    label: nid.split('/').pop() || nid,
                    x: (Math.random() * 0.7 + 0.15) * width,
                    y: (Math.random() * 0.7 + 0.15) * height,
                    vx: 0,
                    vy: 0,
                    visible: true
                };
                nodeMap[nid] = node;
                nodes.push(node);
            }

            for (var si = 0; si < nodeIds.length; si++) {
                var source = nodeIds[si];
                var deps = (graphData[source] && graphData[source].dependencies) || [];
                for (var di = 0; di < deps.length; di++) {
                    var dep = deps[di];
                    var target = typeof dep === 'string' ? dep : dep.path;
                    if (nodeMap[source] && nodeMap[target]) {
                        links.push({
                            source: nodeMap[source],
                            target: nodeMap[target],
                            visible: true
                        });
                    }
                }
            }

            var ns = 'http://www.w3.org/2000/svg';
            var svg = document.createElementNS(ns, 'svg');
            svg.setAttribute('xmlns', ns);
            svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.style.background = '#111';
            svg.style.display = 'block';

            var defs = document.createElementNS(ns, 'defs');
            var marker = document.createElementNS(ns, 'marker');
            marker.setAttribute('id', 'g-arrow');
            marker.setAttribute('viewBox', '0 0 10 10');
            marker.setAttribute('refX', '9');
            marker.setAttribute('refY', '5');
            marker.setAttribute('markerWidth', '6');
            marker.setAttribute('markerHeight', '6');
            marker.setAttribute('orient', 'auto-start-reverse');
            var mPath = document.createElementNS(ns, 'path');
            mPath.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
            mPath.setAttribute('fill', '#ffffff');
            marker.appendChild(mPath);
            defs.appendChild(marker);
            svg.appendChild(defs);

            var viewport = document.createElementNS(ns, 'g');
            svg.appendChild(viewport);

            var edgeLayer = document.createElementNS(ns, 'g');
            var nodeLayer = document.createElementNS(ns, 'g');
            viewport.appendChild(edgeLayer);
            viewport.appendChild(nodeLayer);

            function createEl(name) {
                return document.createElementNS(ns, name);
            }

            for (var li = 0; li < links.length; li++) {
                var line = createEl('line');
                line.setAttribute('stroke', '#ffffff');
                line.setAttribute('stroke-opacity', '0.74');
                line.setAttribute('stroke-width', '1.35');
                line.setAttribute('marker-end', 'url(#g-arrow)');
                edgeLayer.appendChild(line);
                links[li].el = line;
            }

            for (var i = 0; i < nodes.length; i++) {
                var n = nodes[i];
                var g = createEl('g');
                g.setAttribute('data-node', n.id);
                g.style.cursor = 'grab';

                var c = createEl('circle');
                c.setAttribute('r', '12');
                c.setAttribute('fill', '#58a6ff');
                c.setAttribute('stroke', '#ffffff');
                c.setAttribute('stroke-width', '1.8');

                var t = createEl('text');
                t.setAttribute('fill', '#ffffff');
                t.setAttribute('font-size', '11');
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('dominant-baseline', 'hanging');
                t.textContent = n.label;

                var title = createEl('title');
                title.textContent = n.id;

                g.appendChild(c);
                g.appendChild(t);
                g.appendChild(title);
                nodeLayer.appendChild(g);

                n.g = g;
                n.circle = c;
                n.text = t;
                n.dragging = false;

                g.addEventListener('click', (function (id) {
                    return function () {
                        if (window.vscode) {
                            window.vscode.postMessage({ command: 'openFile', text: id });
                        }
                    };
                })(n.id));
            }

            container.innerHTML = '';
            container.appendChild(svg);

            var transform = { x: 0, y: 0, k: 1 };
            var panning = false;
            var panStart = null;

            function applyTransform() {
                viewport.setAttribute('transform', 'translate(' + transform.x + ',' + transform.y + ') scale(' + transform.k + ')');
            }

            function getSvgPoint(evt) {
                var rect = svg.getBoundingClientRect();
                return {
                    x: (evt.clientX - rect.left - transform.x) / transform.k,
                    y: (evt.clientY - rect.top - transform.y) / transform.k
                };
            }

            svg.addEventListener('wheel', function (evt) {
                evt.preventDefault();
                var before = getSvgPoint(evt);
                var factor = evt.deltaY < 0 ? 1.08 : 0.92;
                transform.k = Math.max(0.25, Math.min(3.5, transform.k * factor));
                var rect = svg.getBoundingClientRect();
                transform.x = evt.clientX - rect.left - before.x * transform.k;
                transform.y = evt.clientY - rect.top - before.y * transform.k;
                applyTransform();
            }, { passive: false });

            svg.addEventListener('mousedown', function (evt) {
                if (evt.target === svg || evt.target === edgeLayer || evt.target === viewport) {
                    panning = true;
                    panStart = { x: evt.clientX, y: evt.clientY, tx: transform.x, ty: transform.y };
                }
            });

            window.addEventListener('mousemove', function (evt) {
                if (panning && panStart) {
                    transform.x = panStart.tx + (evt.clientX - panStart.x);
                    transform.y = panStart.ty + (evt.clientY - panStart.y);
                    applyTransform();
                }
            });

            window.addEventListener('mouseup', function () {
                panning = false;
                panStart = null;
            });

            function addDrag(node) {
                node.g.addEventListener('mousedown', function (evt) {
                    evt.stopPropagation();
                    node.dragging = true;
                    node.g.style.cursor = 'grabbing';
                });
            }

            for (var nd = 0; nd < nodes.length; nd++) {
                addDrag(nodes[nd]);
            }

            window.addEventListener('mousemove', function (evt) {
                var needsRender = false;
                for (var dn = 0; dn < nodes.length; dn++) {
                    var node = nodes[dn];
                    if (!node.dragging) continue;
                    var p = getSvgPoint(evt);
                    node.x = p.x;
                    node.y = p.y;
                    node.vx = 0;
                    node.vy = 0;
                    needsRender = true;
                }
                if (needsRender) {
                    render();
                }
            });

            window.addEventListener('mouseup', function () {
                for (var dn = 0; dn < nodes.length; dn++) {
                    nodes[dn].dragging = false;
                    nodes[dn].g.style.cursor = 'grab';
                }
            });

            function clamp(node) {
                var pad = 18;
                node.x = Math.max(pad, Math.min(width - pad, node.x));
                node.y = Math.max(pad, Math.min(height - pad, node.y));
            }

            // Static positioning - no physics simulation
            function step() {
                // Disabled: Remove force-directed simulation to prevent free roam
                return;
            }

            function render() {
                for (var ei = 0; ei < links.length; ei++) {
                    var e = links[ei];
                    e.el.setAttribute('display', e.visible ? 'inline' : 'none');
                    if (!e.visible) continue;
                    e.el.setAttribute('x1', e.source.x.toFixed(2));
                    e.el.setAttribute('y1', e.source.y.toFixed(2));
                    e.el.setAttribute('x2', e.target.x.toFixed(2));
                    e.el.setAttribute('y2', e.target.y.toFixed(2));
                }

                for (var vi = 0; vi < nodes.length; vi++) {
                    var vn = nodes[vi];
                    vn.g.setAttribute('display', vn.visible ? 'inline' : 'none');
                    if (!vn.visible) continue;
                    vn.circle.setAttribute('cx', vn.x.toFixed(2));
                    vn.circle.setAttribute('cy', vn.y.toFixed(2));
                    vn.text.setAttribute('x', vn.x.toFixed(2));
                    vn.text.setAttribute('y', (vn.y + 20).toFixed(2));
                }
            }

            // Static rendering - no animation loop
            function loop() {
                // Disabled: Remove continuous animation to prevent free roam
                return;
            }

            function applyFilter(raw) {
                var q = (raw || '').toLowerCase();
                var visibleIds = {};

                for (var i = 0; i < nodes.length; i++) {
                    var node = nodes[i];
                    node.visible = !q || node.id.toLowerCase().indexOf(q) >= 0;
                    if (node.visible) {
                        visibleIds[node.id] = true;
                    }
                }

                for (var j = 0; j < links.length; j++) {
                    var lk = links[j];
                    lk.visible = !q || visibleIds[lk.source.id] || visibleIds[lk.target.id];
                    if (q && lk.visible) {
                        lk.source.visible = true;
                        lk.target.visible = true;
                    }
                }
            }

            function exportPng() {
                try {
                    var serialized = new XMLSerializer().serializeToString(svg);
                    var blob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
                    var url = URL.createObjectURL(blob);
                    var img = new Image();
                    img.onload = function () {
                        try {
                            var canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            var ctx = canvas.getContext('2d');
                            if (!ctx) {
                                return;
                            }
                            ctx.fillStyle = '#111111';
                            ctx.fillRect(0, 0, width, height);
                            ctx.drawImage(img, 0, 0);
                            var b64 = canvas.toDataURL('image/png').replace(/^data:image\/png;base64,/, '');
                            if (window.vscode) {
                                window.vscode.postMessage({ command: 'saveImage', data: b64 });
                            }
                        } finally {
                            URL.revokeObjectURL(url);
                        }
                    };
                    img.onerror = function () {
                        URL.revokeObjectURL(url);
                    };
                    img.src = url;
                } catch (err) {
                    if (window.vscode) {
                        window.vscode.postMessage({ command: 'error', text: 'Fallback export failed: ' + err });
                    }
                }
            }

            var filterInput = document.getElementById('filter');
            var resetButton = document.getElementById('reset');
            var exportButton = document.getElementById('export');

            if (filterInput) {
                filterInput.addEventListener('input', function (evt) {
                    var val = evt && evt.target ? evt.target.value : '';
                    applyFilter(val);
                    render();
                });
            }

            if (resetButton) {
                resetButton.addEventListener('click', function () {
                    if (filterInput) {
                        filterInput.value = '';
                    }
                    applyFilter('');
                    transform = { x: 0, y: 0, k: 1 };
                    applyTransform();
                    render();
                });
            }

            if (exportButton) {
                exportButton.addEventListener('click', exportPng);
            }

            window.addEventListener('message', function (event) {
                var payload = event && event.data ? event.data : null;
                if (!payload || payload.command !== 'triggerExport') {
                    return;
                }
                exportPng();
            });

            applyFilter('');
            applyTransform();
            render();
            // Disabled: Remove animation loop to prevent free roam
            // loop();
        }, 1200);
    </script>
    <script src="{{scriptUri}}"></script>
</body>

</html>
